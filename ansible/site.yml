---
- name: Deploy webserver01 infrastructure
  hosts: webservers
  become: true
  gather_facts: false
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Ensure Python 3.9+ is available for Ansible
      raw: test -x /usr/bin/python3.9 || (apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3.9)
      changed_when: false

    - name: Gather facts now that Python 3.9 is available
      setup:

  roles:
    - baseline
    - webserver
    - logging
    - monitoring
